<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <title>Clay Raylib example</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #f6f8fc;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        outline: none;
        touch-action: none;
      }
    </style>
  </head>

  <body>
    <canvas
      id="canvas"
      tabindex="-1"
      oncontextmenu="event.preventDefault()"
    ></canvas>
    <script>
      var Module = {
        canvas: document.getElementById("canvas"),
        print: function (text) {
          console.log(text);
        },
        printErr: function (text) {
          console.error(text);
        },
      };

      function fitCanvas() {
        Module.canvas.style.width = window.innerWidth + "px";
        Module.canvas.style.height = window.innerHeight + "px";
      }

      window.addEventListener("resize", fitCanvas);
      fitCanvas();
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
